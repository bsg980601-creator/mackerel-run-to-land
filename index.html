<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>고등어 육지 대탈출</title>
<style>
  html,body{margin:0;height:100%;background:#05070f;overflow:hidden;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;touch-action:none;-webkit-user-select:none;user-select:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#0a1226;box-shadow:0 0 40px #000;image-rendering:auto;touch-action:none;}
</style>

<body>
<div id="wrap"><canvas id="c" width="1920" height="1080"></canvas></div>
<script>
"use strict";
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const W = 1920, H = 1080;

// ---------- 화면 맞춤 ----------
function fit(){
  const s = Math.min(innerWidth/W, innerHeight/H);
  cv.style.width = (W*s)+'px'; cv.style.height = (H*s)+'px';
}
addEventListener('resize', fit); fit();

// ---------- 사운드 (WebAudio 절차생성 — 외부파일 0, 현장 로컬 안전) ----------
let AC=null;
function initAudio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); }
function tone(freq,dur,type,vol,slideTo){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t); if(slideTo)o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t+dur);
  g.gain.setValueAtTime(vol||0.18,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g).connect(AC.destination); o.start(t); o.stop(t+dur); }
function noiseBurst(dur,vol,cut){ if(!AC)return; const t=AC.currentTime; const n=AC.createBufferSource();
  const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*dur),AC.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; n.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=cut||1200; f.Q.value=0.7;
  const g=AC.createGain(); g.gain.setValueAtTime(vol||0.22,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  n.connect(f).connect(g).connect(AC.destination); n.start(t); n.stop(t+dur); }
function sfx(name){ if(!AC)return; switch(name){
  case 'flap':   tone(520,0.11,'triangle',0.16,780); break;
  case 'hit':    tone(300,0.26,'sawtooth',0.26,90); noiseBurst(0.16,0.18,900); break;
  case 'netrip': noiseBurst(0.3,0.32,1800); tone(200,0.18,'square',0.14,120); break;
  case 'warn':   tone(95,0.5,'sawtooth',0.28,58); break;
  case 'dash':   tone(420,0.3,'square',0.18,1300); break;
  case 'rainbow':[880,1175,1568].forEach((f,i)=>setTimeout(()=>tone(f,0.16,'sine',0.16),i*70)); break;
  case 'zone':   tone(660,0.16,'sine',0.18,990); break;
  case 'bonus':  tone(1320,0.12,'sine',0.16,1760); break;
  case 'finale': [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.32,'sine',0.2),i*130)); break;
} }

// ---------- BGM (절차생성 · 모드/존 자동 전환 · 심리스 루프) ----------
// 존마다 음색(wave)·리듬(bassEvery/perc)·템포(bpmStep)를 확실히 다르게 → 전환이 뚜렷
// 존마다 음색·리듬·템포 + 멜로디 패턴(pat)을 완전히 다르게 → 아예 다른 곡처럼 들림 (-1=쉼표)
const BGM = {
  title:  {root:196, scale:[0,3,5,7,10], bpmStep:0.22, wave:'triangle', bassEvery:4, perc:false, pat:[0,-1,2,-1,4,-1,2,-1]},
  z1:     {root:147, scale:[0,3,5,7,10], bpmStep:0.24, wave:'sine',     bassEvery:4, perc:false, pat:[0,-1,-1,2,-1,4,-1,-1]},       // 심해 — 느리고 sparse, 신비
  z2:     {root:196, scale:[0,2,3,7,8],  bpmStep:0.18, wave:'triangle', bassEvery:2, perc:true,  pat:[0,3,0,4,3,0,4,3]},           // 중층 — 반복 몰이, 긴장
  z3:     {root:311, scale:[0,2,4,7,9],  bpmStep:0.155,wave:'square',   bassEvery:2, perc:true,  pat:[4,2,0,2,4,3,4,2]},           // 수면 — 통통 튀는 8비트
  z4:     {root:233, scale:[0,3,5,6,10], bpmStep:0.13, wave:'sawtooth', bassEvery:1, perc:true,  pat:[0,4,3,4,0,4,3,4]},           // 갯벌 — 몰아치는 톱니 질주
  finale: {root:262, scale:[0,4,7,9,12], bpmStep:0.26, wave:'sine',     bassEvery:4, perc:false, pat:[0,2,4,2,0,-1,4,-1]},         // 해소
};
let bgmStep=0, bgmNext=0, bgmKey=null;
function currentBgmKey(){
  if(S.mode==='GAMEOVER') return null;
  if(S.mode==='TITLE'||S.mode==='RESULT') return 'title';
  if(S.mode==='FINALE') return 'finale';
  if(S.mode==='TUTORIAL') return 'z1';
  if(S.mode==='ZONE') return 'z'+(S.zoneIdx+1);
  return 'title';
}
function bgmToneAt(freq,dur,type,vol,t){ if(!AC)return; const o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.value=freq; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g).connect(AC.destination); o.start(t); o.stop(t+dur+0.03); }
function bgmTick(){ if(!AC) return; const key=currentBgmKey();
  if(key!==bgmKey){ bgmKey=key; bgmStep=0; bgmNext=AC.currentTime+0.05; }
  if(!key) return; const cfg=BGM[key]; const now=AC.currentTime;
  if(bgmNext<now) bgmNext=now;
  while(bgmNext < now+0.18){
    const s=bgmStep, sc=cfg.scale, pat=cfg.pat, deg=pat[s%pat.length];
    if(deg>=0) bgmToneAt(cfg.root*Math.pow(2,sc[deg]/12), cfg.bpmStep*0.85, cfg.wave, 0.075, bgmNext); // 멜로디(존별 패턴·음색)
    // 베이스: 근음↔5도 번갈아 진행감
    if(s%cfg.bassEvery===0){ const bd=(Math.floor(s/cfg.bassEvery)%2)? 2:0; bgmToneAt(cfg.root/2*Math.pow(2,sc[bd]/12), cfg.bpmStep*1.7, 'sine', 0.075, bgmNext); }
    if(cfg.perc && s%2===1) bgmToneAt(cfg.root*4, 0.03, 'square', 0.03, bgmNext); // 하이햇 틱
    bgmNext += cfg.bpmStep; bgmStep++;
  }
}

// ---------- 에셋 로드 (실패 시 캔버스 폴백) ----------
const A = {};
function loadImg(key, path){
  const im = new Image(); im.onload=()=>{A[key]={img:im,ok:true};};
  im.onerror=()=>{A[key]={img:null,ok:false};}; im.src=path;
  A[key]={img:im,ok:false};
}
loadImg('title','assets/title.png');
loadImg('z1','assets/z1.png');
loadImg('z2','assets/z2.png');
loadImg('z3','assets/z3.png');
loadImg('z4','assets/z4.png');
loadImg('z5','assets/z5.png');
['idle','flap','charge','dash','hit','joy'].forEach(n=>loadImg('fish_'+n,'assets/sprites/fish_'+n+'.png'));
// 적 캐릭터(과장된 게임 캐릭터)
loadImg('e_shark','assets/sprites/e_shark.png');
loadImg('e_jelly','assets/sprites/e_jelly.png');
loadImg('e_octopus','assets/sprites/e_octopus.png');
loadImg('e_gull','assets/sprites/e_gull.png');
loadImg('e_crab','assets/sprites/e_crab.png');
loadImg('e_puffer','assets/sprites/e_puffer.png');
// 장애물 프롭(도형 대체 스프라이트)
['coral','net','wave','hook','rock','seaweed'].forEach(n=>loadImg('prop_'+n,'assets/sprites/prop_'+n+'.png'));
// 스프라이트를 사각영역에 채워 그림(flipV=상하반전). 세그먼트형 장애물용.
function drawSpriteRect(key,x,y,w,h,flipV){ const a=A[key]; if(!a||!a.ok) return false;
  ctx.save(); if(flipV){ ctx.translate(x,y+h); ctx.scale(1,-1); ctx.drawImage(a.img,0,0,w,h); } else ctx.drawImage(a.img,x,y,w,h); ctx.restore(); return true; }
// 높이 기준 스케일, 중심 cx·상단 topY 앵커
function drawSpriteH(key,cx,topY,h,flipV){ const a=A[key]; if(!a||!a.ok) return false;
  const w=h*a.img.width/a.img.height; ctx.save(); if(flipV){ ctx.translate(cx,topY+h); ctx.scale(-1,-1);} else ctx.translate(cx,topY);
  ctx.drawImage(a.img,-w/2,0,w,h); ctx.restore(); return true; }
// ---------- 애니메이션 스프라이트시트(힉스필드 루프영상→그린키→가로스트립) ----------
const ANIM={}; // key -> {n:프레임수, fps}
function loadAnim(key,path,n,fps){ loadImg('anim_'+key,path); ANIM[key]={n,fps}; }
// 시간 t에 따라 현재 프레임을 중심(cx,cy)·폭 w로 그림. 로드 전이면 false(정적 폴백용).
function animFrame(key){ const a=A['anim_'+key], m=ANIM[key]; if(!(a&&a.ok&&m)) return null;
  return {img:a.img, fw:a.img.width/m.n, fi:Math.floor(S.t*m.fps)%m.n, h:a.img.height}; }
function drawAnimSprite(key,cx,cy,w,flip){ const f=animFrame(key); if(!f) return false;
  const h=w*f.h/f.fw; ctx.save(); ctx.translate(cx,cy); if(flip)ctx.scale(-1,1);
  ctx.drawImage(f.img, f.fi*f.fw,0,f.fw,f.h, -w/2,-h/2,w,h); ctx.restore(); return true; }
function drawAnimRect(key,x,y,w,h,flipV){ const f=animFrame(key); if(!f) return false;
  ctx.save(); if(flipV){ctx.translate(x,y+h);ctx.scale(1,-1);} else ctx.translate(x,y);
  ctx.drawImage(f.img, f.fi*f.fw,0,f.fw,f.h, 0,0,w,h); ctx.restore(); return true; }
function drawAnimH(key,cx,topY,h,flipV){ const f=animFrame(key); if(!f) return false;
  const w=h*f.fw/f.h; ctx.save(); if(flipV){ctx.translate(cx,topY+h);ctx.scale(-1,-1);} else ctx.translate(cx,topY);
  ctx.drawImage(f.img, f.fi*f.fw,0,f.fw,f.h, -w/2,0,w,h); ctx.restore(); return true; }
[['jelly',11,14],['shark',10,14],['octopus',12,16],['gull',13,14],['crab',12,14],['puffer',10,14],
 ['fish',12,14],['coral',8,14],['wave',12,14],['hook',9,14],['net',9,14],['seaweed',9,14]]
 .forEach(([k,fps,n])=>loadAnim(k,'assets/sprites/anim_'+k+'.png',n,fps));
// 스프라이트를 종횡비 유지하며 중심(cx,cy) 기준 폭 w로 그림. flip 시 좌우반전.
function drawSprite(key,cx,cy,w,flip,alpha){
  const a=A[key]; if(!a||!a.ok) return false;
  const h=w*a.img.height/a.img.width;
  ctx.save(); ctx.globalAlpha=alpha==null?1:alpha; ctx.translate(cx,cy); if(flip)ctx.scale(-1,1);
  ctx.drawImage(a.img,-w/2,-h/2,w,h); ctx.restore(); return true;
}

// ---------- 물리 상수 (기획안 6-1) ----------
const GRAV=2200, FLAP=-650, TERM=900;
const Y_MIN=180, Y_MAX=950;
const WATERLINE=540;   // 존4 수면 경계(화면 중앙). 아래=물속만 사용
function curCeil(){ return (typeof S!=='undefined' && S.mode==='ZONE' && S.zoneIdx===3) ? WATERLINE+26 : Y_MIN; }
const FISH_X=W*0.32;
const HITW=60, HITH=30;  // 관대한 판정(게임오버 도입에 맞춰 공정하게)
const HIT_IFRAME=1.1;   // 피격 후 무적 늘려 연속 손실 방지
const ZONE_GRACE=1.4;   // 존 진입 직후 무적 유예(시작하자마자 하트 빠지는 것 방지)
const GAP=270, GAP_TIGHT=225;

// ---------- 존 정의 ----------
// dur(초), bg키, 기본 스크롤. 장애물은 타임라인으로 스폰.
const ZONES=[
  {key:'z1', name:'심해',   sub:'어둠 속을 헤엄쳐라',   dur:21, speed:455, tint:'#0d2036'},
  {key:'z2', name:'중층',   sub:'그물 지대를 뚫어라',   dur:27, speed:490, tint:'#0d2b28'},
  {key:'z3', name:'수면',   sub:'갈매기의 하늘 아래',   dur:27, speed:525, tint:'#123a52'},
  {key:'z4', name:'갯벌',   sub:'육지가 눈앞이다!',     dur:21, speed:560, tint:'#3a2a18'},
];
const FINALE_DUR=10, TUT_DUR=8;
const TOTAL = TUT_DUR + ZONES.reduce((a,z)=>a+z.dur,0) + FINALE_DUR;

// ---------- 상태 ----------
let S; // 게임 상태 객체
function reset(toTitle=true){
  const keepSkip = !!(S && S.skipTut); // 오퍼레이터 T 토글은 리셋에도 유지
  S={
    mode: toTitle?'TITLE':'TUTORIAL',
    t:0, zoneIdx:0, zoneT:0, scroll:0, speed:400,
    fishY:H/2, fishVY:0, rot:0,
    lives:3, iframe:0,
    heartLossT:0, heartLossIdx:-1, dodgeSpawned:0,
    obstacles:[], spawnCursor:0, particles:[], confetti:[],
    hitFlash:0, tutTaps:0, tutDone:false, tutRings:[], flapAnim:0,
    tutStage:0, stageT:0, tutObs:[], tutMashed:false,
    shark:0, mud:0, finaleT:0, shownGoal:false,
    skipTut:keepSkip, msg:'', msgT:0, shake:0, slowmo:0, amb:[], hitstop:0,
    score:0, pops:[], trapped:false, trapHP:1, trapTime:0, trapObj:null,
    fadeT:0, fadeFrom:null,
    landing:false, legs:0, walk:0, walkOff:false, fishXOff:0  // 육지 다리 엔딩
  };
  // 튜토리얼 링 3개
  for(let i=0;i<3;i++) S.tutRings.push({x:W+ i*520 + 500, y:H/2, hit:false});
}
reset(true);

// ---------- 입력 ----------
function playerDown(){
  initAudio();
  if(S.mode==='TITLE'){ startGame(); return; }
  if(S.mode==='GAMEOVER'){ if(S.goT>0.6) startGame(); return; }
  if(S.mode==='RESULT'){ reset(true); return; }
  flap(); // 순수 원버튼: 누르는 즉시 헤엄 (홀드·차징 없음)
}
function playerUp(){}
function flap(){
  if(S.trapped){ // 갇힘: 그물 내구도(빨강, 100%)를 연타로 깎아 0이 되면 탈출
    S.trapHP=Math.max(0, (S.trapHP==null?1:S.trapHP)-0.13); sfx('flap'); shake(3);
    spawnParticles(FISH_X,S.fishY,4,'#cfe8ff'); if(S.trapHP<=0) releaseTrap(); return;
  }
  S.fishVY=FLAP; S.flapAnim=0.18;
  spawnParticles(FISH_X-20,S.fishY+10,6,'#cfe8ff'); sfx('flap');
}
function startGame(){
  reset(false);
  if(S.skipTut){ S.mode='ZONE'; S.zoneIdx=0; S.zoneT=0; S.speed=ZONES[0].speed; S.iframe=ZONE_GRACE; armZone(0); zoneBanner(0); }
}
addEventListener('keydown',e=>{
  initAudio();
  const k=e.key;
  if(k===' '||k==='Enter'){ e.preventDefault(); playerDown(); return; }
  const low=k.toLowerCase();
  if(low==='s'){ if(S.mode==='TITLE') startGame(); }
  else if(low==='r'){ reset(true); }
  else if(low==='t'){ S.skipTut=!S.skipTut; toast('튜토리얼 생략: '+(S.skipTut?'켬':'끔')); }
  else if(low==='f'){ gotoFinale(); }
  else if(k>='1'&&k<='4'){ jumpZone(parseInt(k)-1); } // 리허설 존 점프
});
addEventListener('keyup',e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); playerUp(); }});
// 마우스/터치도 스페이스 취급(리허설 편의)
addEventListener('mousedown',e=>{ if(e.button===0){ initAudio(); playerDown(); } });
addEventListener('mouseup',e=>{ playerUp(); });
// 모바일 터치: 탭=헤엄, 홀드=파워대시, 연타=트랩 탈출 (스페이스와 동일)
addEventListener('touchstart',e=>{ e.preventDefault(); initAudio(); playerDown(); }, {passive:false});
addEventListener('touchend',e=>{ e.preventDefault(); playerUp(); }, {passive:false});
addEventListener('touchcancel',e=>{ playerUp(); }, {passive:false});

function jumpZone(i){
  if(S.mode==='TITLE') startGame();
  if(S.mode==='ZONE'){ S.fadeFrom=ZONES[S.zoneIdx].key; S.fadeT=1; }
  S.trapped=false; S.trapObj=null;
  S.mode='ZONE'; S.zoneIdx=i; S.zoneT=0; S.obstacles=[]; S.spawnCursor=0;
  S.speed=ZONES[i].speed; S.shark=0; S.mud=0; S.iframe=ZONE_GRACE; armZone(i); sfx('zone'); zoneBanner(i);
}
function gotoFinale(){ S.mode='FINALE'; S.finaleT=0; S.obstacles=[]; S.msg=''; S.msgT=0; S.shark=0; spawnConfetti(); sfx('finale'); }

function toast(m){ S.msg=m; S.msgT=1.6; }
// 존 진입 배너 — 구간명+부제를 크게 2.2초 (관객 연출)
function zoneBanner(i){ S.bannerMain=(i+1)+'구간 · '+ZONES[i].name; S.bannerSub=ZONES[i].sub; S.bannerT=2.2; }
function drawBanner(){
  if(!(S.bannerT>0)) return; const p=S.bannerT/2.2;
  const a = p>0.85? (1-p)/0.15 : (p<0.25? p/0.25 : 1); // 페이드 인/아웃
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
  ctx.font='bold 96px sans-serif'; ctx.lineWidth=10; ctx.strokeStyle='rgba(0,0,0,0.6)';
  ctx.strokeText(S.bannerMain, W/2, H*0.3); ctx.fillStyle='#fff'; ctx.fillText(S.bannerMain, W/2, H*0.3);
  ctx.font='38px sans-serif'; ctx.lineWidth=6;
  ctx.strokeText(S.bannerSub, W/2, H*0.3+62); ctx.fillStyle='#ffe14d'; ctx.fillText(S.bannerSub, W/2, H*0.3+62);
  ctx.textAlign='left'; ctx.restore();
}
function flash(c,d){ S._flashC=c; S.hitFlash=Math.max(S.hitFlash,d); }
function addPop(txt,x,y,c){ (S.pops=S.pops||[]).push({txt,x,y,life:1,c:c||'#fff'}); }
function bestScore(v){ try{ const k='mackerel_best'; const b=+(localStorage.getItem(k)||0); if(v!=null&&v>b){localStorage.setItem(k,v);return v;} return Math.max(b,v||0);}catch(e){ return v||0; } }
function shake(a){ S.shake=Math.max(S.shake,a); }
function slowmo(d){ S.slowmo=Math.max(S.slowmo,d); }

// ---------- 파티클 ----------
function spawnParticles(x,y,n,c){
  for(let i=0;i<n;i++) S.particles.push({x,y,vx:(Math.random()-0.5)*180-60,vy:(Math.random()-0.5)*180,life:0.5+Math.random()*0.4,c});
}
function spawnConfetti(){
  const cols=['#ff5a5a','#ffd23f','#3fd9ff','#5aff8f','#c77dff','#ffffff'];
  for(let i=0;i<160;i++) S.confetti.push({x:Math.random()*W,y:-Math.random()*H,vx:(Math.random()-0.5)*120,vy:120+Math.random()*260,r:6+Math.random()*8,c:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-0.5)*10});
}

// ---------- 장애물 스폰 (존별 타임라인) ----------
// type: coral/tentacle/net/line/wave/gull/hook  — 대부분 gap 통과형(회피 가능), 충돌은 목숨만 소모
// 각 존 진입 시 변형 테이블 중 하나를 랜덤 선택(매판 패턴이 달라짐) + 스폰 시각 ±0.35s 지터
function armZone(zoneIdx){
  const pool=SPAWN_VARIANTS[zoneIdx];
  SPAWN_TABLE[zoneIdx]=pool[Math.floor(Math.random()*pool.length)]();
  SPAWN_TABLE[zoneIdx].forEach(ev=>{ ev.done=false; ev._t=Math.max(0.6, ev.t+(Math.random()-0.5)*0.7); });
}
function gapObstacle(type, gapY, gap=GAP){
  gapY = Math.max(Y_MIN+gap/2+30, Math.min(Y_MAX-gap/2-30, gapY + (Math.random()-0.5)*220)); // 위치 랜덤화(단조로움 제거)
  return {type, x:W+120, gapY, gap, w:130, broken:false, hitDone:false, baseGapY:gapY, ph:Math.random()*6,
    update(dt){ this.x -= S.speed*dt; if(type==='net'){ this.ph+=dt*1.4; this.gapY=this.baseGapY+Math.sin(this.ph)*46; } },
    off(){ return this.x < -200; },
    rects(){ if(this.broken) return [];
      return [ {x:this.x, y:0, w:this.w, h:this.gapY-this.gap/2},
               {x:this.x, y:this.gapY+this.gap/2, w:this.w, h:H-(this.gapY+this.gap/2)} ]; }
  };
}
function topObstacle(type, len){ // 위에서 내려오는 단일 블록(문어촉수/갈고리)
  return {type, x:W+120, len, w:90, hitDone:false,
    update(dt){ this.x -= S.speed*dt; },
    off(){ return this.x < -160; },
    rects(){ return [{x:this.x, y:Y_MIN-40, w:this.w, h:this.len}]; }
  };
}
function lineObstacle(){ // 낚싯줄+미끼 — 줄은 통과 가능, 미끼(빨간 점)만 위험(그 높이만 피하면 됨)
  return {type:'line', x:W+120, w:26, baitY:300+Math.random()*440, hitDone:false,
    update(dt){ this.x -= S.speed*dt; },
    off(){ return this.x < -80; },
    rects(){ return [{x:this.x-14, y:this.baitY-34, w:44, h:68}]; } // 미끼 주변만 판정
  };
}
function gullObstacle(){ // 갈매기 — 상공 순항 → "!" 예고 → 급강하(낮게 있으면 안전, 공정한 회피)
  return {type:'gull', x:W+120, y:Y_MIN-10+Math.random()*60, vy:0, dive:false, pre:0, ph:Math.random()*6,
    dvy:300+Math.random()*140, w:120, h:70, hitDone:false,
    update(dt){ this.x -= (S.speed+110)*dt; this.ph+=dt*3;
      if(!this.dive){ this.y += Math.sin(this.ph)*22*dt;               // 순항(위협 없음처럼 보이게 살짝 흔들)
        if(this.x<1280 && this.pre===0){ this.pre=0.42; sfx('flap'); } // 예고 "!" 표시 시작
        if(this.pre>0){ this.pre-=dt; if(this.pre<=0){ this.dive=true; this.vy=this.dvy; } } }
      else { this.y += this.vy*dt; if(this.y>740) this.vy=-80; } },
    off(){ return this.x < -160; },
    rects(){ return [{x:this.x+18, y:this.y+14, w:84, h:44}]; }
  };
}
function jellyObstacle(y){ // 독 해파리 — 부유하며 회피, 상하 흔들림 폭·속도 랜덤
  return {type:'jelly', x:W+120, baseY:y, y, w:150, ph:Math.random()*6, amp:30+Math.random()*34, spd:1.2+Math.random()*0.8, hitDone:false,
    update(dt){ this.x -= (S.speed*0.92)*dt; this.ph+=dt*this.spd; this.y=this.baseY+Math.sin(this.ph)*this.amp; },
    off(){ return this.x < -160; },
    rects(){ return [ {x:this.x-40, y:this.y-42, w:80, h:60},
                      {x:this.x-24, y:this.y+16, w:48, h:96} ]; }
  };
}
// 상어: 크기(sz)·속도(spdMul) 각기 다름. 작을수록 빠르고 경고 짧음, 클수록 극적. 반복 등장.
function sharkObstacle(y, sz, spdMul){
  sz = sz || 1; spdMul = spdMul || 1;
  const w=Math.round(560*sz), warn=Math.max(0.35, 0.35+0.5*sz), big=sz>=0.95;
  const spd=(260+340*(1.35-sz))*spdMul;   // 작을수록 빠름 + 개별 속도 배수
  const hw=230*sz, hh=150*sz;
  return {type:'shark', x:W+260, y, w, sz, warned:warn, hitDone:false, charge:false, told:false,
    update(dt){ if(!this.told){ this.told=true; sfx('warn'); }
      if(this.warned>0){ this.warned-=dt; return; }
      if(!this.charge){ this.charge=true; shake(big?16:9); if(big)slowmo(0.5); sfx('warn'); toast(big?'상어다!! 피해!!':'상어!'); }
      this.x -= (S.speed+spd)*dt; if(Math.random()<0.4) spawnParticles(this.x+hw*0.5,this.y+30,3,'#cfeeffcc'); },
    off(){ return this.x < -360; },
    rects(){ if(this.warned>0) return [];
      return [{x:this.x-hw*0.74, y:this.y-hh*0.47, w:hw, h:hh}]; }
  };
}
function pufferObstacle(y){ // 복어 — 멀리선 작다가 접근하면 크게 부풀어 가시 섬(대비 강화)
  return {type:'puffer', x:W+120, baseY:y, y, w:130, ph:Math.random()*6, puff:0.55, hitDone:false, popped:false,
    update(dt){ this.x -= (S.speed*0.98)*dt; this.ph+=dt*1.1; this.y=this.baseY+Math.sin(this.ph)*34;
      const near=this.x<940 && this.x>240; const tgt=near?1.55:0.55; this.puff+=(tgt-this.puff)*Math.min(1,dt*6);
      if(near && !this.popped){ this.popped=true; sfx('flap'); spawnParticles(this.x,this.y,10,'#e8d38a'); } },
    off(){ return this.x < -170; },
    rects(){ const r=46*this.puff; return [{x:this.x-r, y:this.y-r, w:2*r, h:2*r}]; }
  };
}
function rainbowObstacle(){ // 무지개 보너스 — 장애물 아님, 통과 시 컨페티
  return {type:'rainbow', x:W+120, w:200, got:false, hitDone:true,
    update(dt){ this.x -= S.speed*dt;
      if(!this.got && Math.abs(this.x-FISH_X)<60){ this.got=true; S.score+=200; addPop('+200', FISH_X, S.fishY-40, '#ffd23f'); spawnParticles(FISH_X,S.fishY,24,'#ffd23f'); toast('✦ 보너스 +200 ✦'); flash('#fff',0.12); sfx('bonus'); } },
    off(){ return this.x < -220; },
    rects(){ return []; }
  };
}
// 하단 굴러오는 바위 — 바닥을 달려와 고등어를 위로 몰아붙임(난이도↑)
function rockObstacle(){
  return {type:'rock', x:W+140, w:200, rot:0, hitDone:false,
    update(dt){ const v=S.speed*1.06; this.x -= v*dt; this.rot += v*dt/95; },
    off(){ return this.x < -260; },
    rects(){ return [{x:this.x-78, y:Y_MAX-150, w:156, h:210}]; } // 바닥 범프
  };
}
// 해초 — 바닥에서 솟은 긴 켈프(하단 장애물 다양화). 위로 회피.
function seaweedObstacle(){
  return {type:'seaweed', x:W+140, w:180, hitDone:false,
    update(dt){ this.x -= S.speed*dt; },
    off(){ return this.x < -220; },
    rects(){ return [{x:this.x-50, y:Y_MAX-175, w:100, h:235}]; }
  };
}
// 그물 트랩 — 전체 높이라 무조건 걸림. 걸리면 갇혀 못 움직이고, 스페이스 연타로만 탈출.
function netTrapObstacle(){
  return {type:'nettrap', x:W+160, w:170, caught:false, broken:false, hitDone:true,
    update(dt){ if(this.broken){ this.x -= (S.speed+320)*dt; return; }
      if(S.trapped && S.trapObj===this) return; // 잡은 동안 고정
      this.x -= S.speed*dt;
      if(!this.caught && this.x <= FISH_X+20){ this.caught=true; this.x=FISH_X;
        S.trapped=true; S.trapHP=1; S.trapTime=0; S.trapObj=this;
        shake(12); sfx('hit'); toast('잡혔다! 연타로 탈출!'); } },
    off(){ return this.x < -260 || (this.broken && this.x < FISH_X-500); },
    rects(){ return []; } // 물리충돌 아님(자체 트랩 로직)
  };
}
function releaseTrap(){
  if(!S.trapped) return; S.trapped=false; S.trapTime=0;
  if(S.mode==='TUTORIAL') S.tutMashed=true; // 튜토리얼: 연타 탈출 학습 완료 표시
  if(S.trapObj){ S.trapObj.broken=true; S.trapObj.caught=false; S.trapObj=null; }
  S.iframe=0.9; S.fishVY=-460; shake(10); flash('#fff',0.2); sfx('netrip');
  spawnParticles(FISH_X,S.fishY,26,'#9fe0ff'); toast('탈출!'); S.score+=60; addPop('+60 탈출',FISH_X,S.fishY-40,'#7fffd4');
}
function crabObstacle(){ // 성난 게 — 접근 시 집게질(들썩+펄스)로 위협, 위로 회피
  return {type:'crab', x:W+120, w:180, snap:0, tt:0, hitDone:false,
    update(dt){ this.x -= S.speed*dt; this.tt+=dt;
      const near=this.x<820 && this.x>200; this.snap = near? Math.abs(Math.sin(this.tt*9)) : 0; },
    off(){ return this.x < -220; },
    rects(){ const rise=this.snap*40; return [{x:this.x-70, y:Y_MAX-130-rise, w:150, h:180+rise}]; }
  };
}
function waveObstacle(){ // 파도 언덕(바닥 지형)
  return {type:'wave', x:W+120, w:260, h:230, hitDone:false,
    update(dt){ this.x -= S.speed*dt; },
    off(){ return this.x < -300; },
    rects(){ return [{x:this.x+30, y:H-this.h, w:200, h:this.h}]; }
  };
}

    ()=>[ {t:1.8,make:()=>mk.rock()}, {t:3.2,make:()=>mk.crab()}, {t:4.6,make:()=>mk.shark(700,0.5,1.2)}, {t:6.6,make:()=>mk.nettrap()}, {t:8.8,make:()=>mk.rock()}, {t:10.0,make:()=>mk.gull()}, {t:11.2,make:()=>mk.hook(560)}, {t:12.6,make:()=>mk.crab()}, {t:14.2,make:()=>mk.nettrap()}, {t:16.4,make:()=>mk.rock()}, {t:17.6,make:()=>mk.shark(760,1.0,0.95)}, {t:19.2,make:()=>mk.gull()}, {t:20.2,make:()=>mk.hook(560)}, {t:20.9,make:()=>mk.shark(700,0.5,1.2)} ],
    ()=>[ {t:1.8,make:()=>mk.hook(560)}, {t:3.0,make:()=>mk.hook(500)}, {t:4.4,make:()=>mk.crab()}, {t:5.8,make:()=>mk.shark(720,0.45,1.25)}, {t:7.4,make:()=>mk.nettrap()}, {t:9.6,make:()=>mk.rock()}, {t:10.8,make:()=>mk.gull()}, {t:11.5,make:()=>mk.gull()}, {t:13.1,make:()=>mk.hook(560)}, {t:14.5,make:()=>mk.crab()}, {t:16.1,make:()=>mk.nettrap()}, {t:18.3,make:()=>mk.shark(680,0.55,1.15)}, {t:19.5,make:()=>mk.rock()}, {t:20.5,make:()=>mk.gull()}, {t:21.0,make:()=>mk.crab()} ] ],
];
const SPAWN_TABLE=[[],[],[],[]]; // armZone()이 매판 변형을 골라 채움

// ---------- 업데이트 ----------
function update(dt){
  if(S.msgT>0) S.msgT-=dt;
  if(S.hitFlash>0) S.hitFlash-=dt;
  if(S.heartLossT>0) S.heartLossT-=dt;
  if(S.bannerT>0) S.bannerT-=dt;
  if(S.fadeT>0) S.fadeT-=dt/0.7; // 존 전환 크로스페이드(0.7초)
  // 파티클
  for(const p of S.particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=400*dt; p.life-=dt; }
  S.particles=S.particles.filter(p=>p.life>0);
  // 앰비언트 기포(물속 생동감) — 존/튜토리얼에서만
  if((S.mode==='ZONE'||S.mode==='TUTORIAL') && Math.random()<0.5){
    S.amb.push({x:Math.random()*W, y:H+10, r:3+Math.random()*7, vy:-40-Math.random()*80, sway:Math.random()*6, life:1});
  }
  for(const p of S.amb){ p.sway+=dt*2; p.x+=Math.sin(p.sway)*12*dt; p.y+=p.vy*dt; }
  S.amb=S.amb.filter(p=>p.y>-20);
  for(const p of (S.pops||[])){ p.y-=40*dt; p.life-=dt*0.8; }
  S.pops=(S.pops||[]).filter(p=>p.life>0);

  if(S.mode==='TITLE'){ S.t+=dt; return; }

  if(S.mode==='TUTORIAL'){ updateTut(dt); return; }
  if(S.mode==='FINALE'){ updateFinale(dt); return; }
  if(S.mode==='GAMEOVER'){ S.goT=(S.goT||0)+dt; if(S.goT>14) reset(true); return; } // 방치 시 타이틀 자동 복귀(공연 안전)
  if(S.mode!=='ZONE') return;

  // ----- 그물 트랩에 갇힘: 세계 정지, 연타로만 탈출 -----
  if(S.trapped){
    if(S.trapObj) S.trapObj.update(dt);
    S.trapHP=Math.min(1,(S.trapHP==null?1:S.trapHP)+dt*0.35); // 그물이 서서히 조여옴(내구도 회복) → 연타 필요
    S.trapTime=(S.trapTime||0)+dt;
    S.fishY += Math.sin(S.t*40)*1.4; S.fishVY=0;      // 버둥거림
    if(S.iframe>0) S.iframe-=dt;
    if(S.trapTime>9) releaseTrap();                    // 안전장치: 9초 후 자동 해제
    S.zoneT += dt*0.15; S.t += dt;                     // 살짝만 진행(완전정지 방지)
    return;
  }

  // ----- 존 진행 -----
  const Z=ZONES[S.zoneIdx];
  if(S.iframe>0) S.iframe-=dt;
  if(S.flapAnim>0) S.flapAnim-=dt;

  // 스크롤 속도: 존 기본 + 진행할수록 조금씩 빨라지는 러시(점진적 템포 상승) + 상어 추격 가속
  const rush = Math.min(0.34, S.t*0.006);   // 시간이 지날수록 최대 +34%까지 서서히
  let target=Z.speed*(1+rush);
  if(S.zoneIdx===1 && S.zoneT>4){ S.shark=Math.min(1,S.shark+dt/5); target*=(1+0.32*S.shark); }
  if(S.mud>0){ S.mud-=dt; target*=0.4; }
  S.speed += (target-S.speed)*Math.min(1,dt*3);

  // 물리
  S.fishVY += GRAV*dt;
  if(S.fishVY>TERM) S.fishVY=TERM;
  S.fishY += S.fishVY*dt;
  const ceil = curCeil();  // 존4는 수면(중앙) 아래만 사용
  if(S.fishY<ceil){ S.fishY=ceil; S.fishVY=Math.max(0,S.fishVY); }
  if(S.fishY>Y_MAX){ S.fishY=Y_MAX; S.fishVY=Math.min(0,S.fishVY); }
  S.rot = Math.max(-0.4,Math.min(0.6, S.fishVY/1600));

  S.scroll += S.speed*dt;
  S.score += S.speed*dt*0.02; // 거리 점수(빠를수록 더)
  S.zoneT += dt; S.t += dt;

  // 스폰
  for(const ev of SPAWN_TABLE[S.zoneIdx]){ if(S.zoneT>=(ev._t!=null?ev._t:ev.t) && !ev.done){ ev.done=true; S.obstacles.push(ev.make()); } }

  // 장애물 업데이트/충돌
  const fr={x:FISH_X-HITW/2, y:S.fishY-HITH/2, w:HITW, h:HITH};
  for(const o of S.obstacles){
    o.update(dt);
    if(!o.hitDone && S.iframe<=0){
      for(const r of o.rects()){
        if(rectHit(fr,r)){ o.hitDone=true; S.lastHit=o.type; onHit(); break; }
      }
    }
  }
  // 회피 보너스: 위협 장애물을 안 맞고 통과시키면 +점수
  for(const o of S.obstacles){ if(o.off() && !o._scored){ o._scored=true;
    if(o.type!=='rainbow' && !o.hitDone){ const pts = o.type==='shark'? Math.round(40*(o.sz||1)) : 12;
      S.score += pts; addPop('+'+pts, FISH_X+60, S.fishY-30, '#7fffd4'); } } }
  S.obstacles=S.obstacles.filter(o=>!o.off());

  // 존 종료 → 다음
  if(S.zoneT>=Z.dur){
    if(S.zoneIdx<ZONES.length-1){ S.fadeFrom=ZONES[S.zoneIdx].key; S.fadeT=1; S.zoneIdx++; S.zoneT=0; S.obstacles=[]; S.iframe=ZONE_GRACE; armZone(S.zoneIdx); sfx('zone'); zoneBanner(S.zoneIdx); }
    else { gotoFinale(); }
  }
}
function onHit(){
  S.lives=Math.max(0,S.lives-1);
  S.heartLossIdx=S.lives; S.heartLossT=0.9; // 방금 잃은 하트 슬롯 — HUD에서 깨지는 연출
  addPop('하트 -1', FISH_X+60, S.fishY-70, '#ff6a6a');
  S.iframe=HIT_IFRAME; flash('#ff3b3b',0.22); shake(14); sfx('hit'); S.hitstop=0.08;
  S.fishVY=-260; spawnParticles(FISH_X,S.fishY,16,'#ffd23f');
  if(S.lives<=0){ gameOver(); } else { toast('아야! 하트 '+S.lives+'개 남음'); }
}
function gameOver(){
  S.mode='GAMEOVER'; S.goT=0; S.deadZone=S.zoneIdx;
  shake(20); flash('#000',0.5); sfx('hit');
}
function rectHit(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

// 체험형 튜토리얼 — 단계별로 직접 해보며 배운다(하트 안 깎임)
// 0: 탭(링 3개 통과) → 1: 피하기(해파리·해초 회피) → 2: 연타(그물에 잡혀서 탈출) → 3: 여정 안내+카운트다운
function tutNext(n){ S.tutStage=n; S.stageT=0; sfx('zone'); }
const TUT_DODGE=[ [0.6,()=>jellyObstacle(430)], [3.0,()=>seaweedObstacle()], [5.4,()=>jellyObstacle(650)] ];
function updateTut(dt){
  S.t+=dt; S.tutT=(S.tutT||0)+dt; S.stageT+=dt;
  if(S.flapAnim>0) S.flapAnim-=dt;
  if(S.iframe>0) S.iframe-=dt;
  // 그물에 잡힘 — 연타 탈출 연습(flap()의 연타 로직이 그대로 동작)
  if(S.trapped){
    if(S.trapObj) S.trapObj.update(dt);
    S.trapHP=Math.min(1,(S.trapHP==null?1:S.trapHP)+dt*0.22); // 본게임보다 살짝 관대
    S.trapTime=(S.trapTime||0)+dt;
    S.fishY += Math.sin(S.t*40)*1.4; S.fishVY=0;
    if(S.trapTime>9) releaseTrap();
    return;
  }
  // 물리(첫 탭 전엔 정지)
  if(S.tutTaps>0){
    S.fishVY+=GRAV*dt; if(S.fishVY>TERM)S.fishVY=TERM; S.fishY+=S.fishVY*dt;
    if(S.fishY<Y_MIN){S.fishY=Y_MIN;S.fishVY=0;} if(S.fishY>Y_MAX){S.fishY=Y_MAX;S.fishVY=0;}
    S.scroll+=380*dt;
  }
  S.rot=Math.max(-0.4,Math.min(0.6,S.fishVY/1600));
  // 연습 장애물 이동 + 접촉 판정(하트는 안 깎이고 경고만)
  for(const o of S.tutObs) o.update(dt);
  if(S.tutStage===1 && S.iframe<=0){
    const fr={x:FISH_X-HITW/2, y:S.fishY-HITH/2, w:HITW, h:HITH};
    for(const o of S.tutObs){ if(o.hitDone) continue;
      for(const r of o.rects()){ if(rectHit(fr,r)){ o.hitDone=true; S.iframe=1.0;
        flash('#ff3b3b',0.2); shake(10); sfx('hit'); S.fishVY=-260;
        addPop('하트 -1', FISH_X+60, S.fishY-70, '#ff6a6a'); toast('앗! 본게임에선 하트가 깎인다!'); break; } } }
  }
  S.tutObs=S.tutObs.filter(o=>!o.off());

  if(S.tutStage===0){ // 탭 배우기: 링 3개
    if(S.tutTaps>0) for(const r of S.tutRings){ r.x-=380*dt;
      if(!r.hit && Math.abs(r.x-FISH_X)<40 && Math.abs(r.y-S.fishY)<90){ r.hit=true; spawnParticles(r.x,r.y,10,'#7fffd4'); sfx('bonus'); } }
    if(S.tutRings.every(r=>r.hit) || S.stageT>12){ toast('좋아! 이번엔 피하기'); tutNext(1); }
  } else if(S.tutStage===1){ // 피하기 배우기: 해파리·해초를 위아래로 회피
    while(S.dodgeSpawned<TUT_DODGE.length && S.stageT>=TUT_DODGE[S.dodgeSpawned][0]){ S.tutObs.push(TUT_DODGE[S.dodgeSpawned][1]()); S.dodgeSpawned++; }
    if((S.dodgeSpawned>=TUT_DODGE.length && S.tutObs.length===0) || S.stageT>18){ S.tutObs=[]; toast('잘 피한다!'); tutNext(2); }
  } else if(S.tutStage===2){ // 연타 배우기: 그물에 잡혀서 탈출
    if(S.tutObs.length===0 && !S.tutMashed) S.tutObs.push(netTrapObstacle());
    if(S.tutMashed || S.stageT>15){ S.tutObs=[]; tutNext(3); }
  } else { // 여정 안내 + 3·2·1 출발
    if(!S.tutDone){ S.tutDone=true; S.cd=3.4; }
    S.cd-=dt;
    if(S.cd<=0){ S.mode='ZONE'; S.zoneIdx=0; S.zoneT=0; S.speed=ZONES[0].speed; S.iframe=ZONE_GRACE; armZone(0); sfx('zone'); zoneBanner(0); }
  }
}
// 튜토리얼 첫 탭 후킹: playerDown에서 처리되도록 flap()이 tutTaps 증가
const _flap=flap;
flap=function(){ if(S.mode==='TUTORIAL'){ S.tutTaps++; } _flap(); };

function updateFinale(dt){
  S.finaleT+=dt; S.t+=dt; const T=S.finaleT;
  const SAND=H*0.76;
  if(T<1.8){ // 1) 수면 위로 솟구침(헤엄)
    S.scroll += 220*dt;
    S.fishY += (H*0.34 - S.fishY)*Math.min(1,dt*2.6); S.rot=-0.35; S.landing=false;
    S.legs=0; S.walkOff=false; S.fishXOff=0;
  } else if(T<2.7){ // 2) 착지 → 잠깐 팔딱 → 다리가 돋는다
    if(!S.landing){ S.landing=true; shake(10); sfx('zone'); spawnParticles(FISH_X,SAND,20,'#ffe1a0'); }
    S.scroll += 30*dt;
    const bt=T-1.8;
    const hop=Math.max(0, Math.abs(Math.sin(bt*7.0))*22*(1-bt/0.9)); // 팔딱은 점점 잦아듦
    S.fishY = SAND - hop;
    S.rot = Math.sin(T*11)*0.4*(1-Math.min(1,bt/0.9));               // 비틀기도 잦아듦
    S.legs = Math.min(1, Math.max(0,(bt-0.3))/0.7);                  // 0.3s 뒤부터 0.7s간 다리 돋음
    if(S.legs>0 && S.legs<0.3 && Math.random()<0.4) spawnParticles(FISH_X,SAND+8,3,'#dff3ff'); // 돋을 때 반짝
  } else if(T<3.5){ // 3) 두 발로 딛고 선다(자세 안정)
    S.legs=1; S.rot += (0 - S.rot)*Math.min(1,dt*6);                 // 수평으로 반듯이
    S.fishY += (SAND - S.fishY)*Math.min(1,dt*6);
    S.walk = (S.walk||0) + dt*3;                                     // 제자리 준비 스텝
  } else { // 4) 두 발로 걸어서 화면 밖으로 퇴장 → 엔딩
    S.walkOff=true;
    S.walk = (S.walk||0) + dt*9;                                     // 걷기 사이클
    S.fishXOff = (S.fishXOff||0) + 340*dt;                           // 오른쪽으로 성큼성큼(약 4초에 퇴장)
    S.fishY = SAND - Math.abs(Math.sin(S.walk))*5;                   // 걸음마다 살짝 들썩
    S.rot = Math.sin(S.walk*2)*0.05;                                 // 뒤뚱
    if(FISH_X + S.fishXOff > W + 200){ S.mode='RESULT'; S.resT=0; }  // 완전히 나가면 결과
  }
  for(const p of S.confetti){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.vr*dt; if(p.y>H+20){p.y=-20;p.x=Math.random()*W;} }
  if(S.finaleT>=FINALE_DUR && !S.walkOff){ S.mode='RESULT'; S.resT=0; } // 안전장치
}
// 육지 도착 연출 보강: 모래 위 친구들이 모여들고 축하 텍스트
function drawFinaleExtras(){
  const T=S.finaleT, SAND=H*0.76;
  if(!S.landing) return;
  const bt=T-1.8; // 착지 후 경과
  // 친구들: 게·복어가 양옆에서 걸어들어와 함께 팔딱/집게질 (무리가 다시 생긴다)
  const inL = Math.min(1,bt/1.6), inR=Math.min(1,(bt-0.5)/1.6);
  const crabX = W*0.16 + (1-inL)*(-260);
  const pufX  = W*0.74 + (1-inR)*( 260);
  if(bt>0){ if(!drawAnimSprite('crab', crabX, SAND+8, 150)) drawSprite('e_crab', crabX, SAND+8, 150); }
  if(bt>0.5){ const ph=Math.abs(Math.sin(T*5))*18; if(!drawAnimSprite('puffer', pufX, SAND-20-ph, 130)) drawSprite('e_puffer', pufX, SAND-20-ph, 130); }
  // 두 번째 고등어 친구(작게) 수면에서 합류
  if(bt>1.2){ const fx=W*0.52, fy=SAND-Math.abs(Math.sin(T*6.5+1))*24; drawAnimSprite('fish', fx, fy, 120, false); }
  // 축하 텍스트(펄스)
  if(bt>0.6){ ctx.save(); ctx.textAlign='center'; const sc=1+Math.sin(T*5)*0.04;
    ctx.font='bold '+Math.round(96*sc)+'px sans-serif'; ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,0.55)';
    ctx.strokeText('해냈다!!', W/2, H*0.28); ctx.fillStyle='#ffe14d'; ctx.fillText('해냈다!!', W/2, H*0.28);
    ctx.font='30px sans-serif'; ctx.fillStyle='#fff'; ctx.fillText('모래사장에서 만난 새로운 무리', W/2, H*0.28+44);
    ctx.textAlign='left'; ctx.restore(); }
}

// ---------- 렌더 ----------
function draw(){
  ctx.clearRect(0,0,W,H);
  if(S.mode==='TITLE'){ drawTitle(); drawFlashMsg(); return; }
  if(S.mode==='RESULT'){ drawBG('z5'); drawResult(); return; }
  if(S.mode==='GAMEOVER'){ drawBG(ZONES[S.deadZone||0].key); drawGameOver(); return; }
  if(S.mode==='FINALE'){ drawBG('z5'); drawConfetti(); drawFinaleExtras(); drawFish(); drawHUD(); drawFlashMsg(); return; }

  const zoneKey = S.mode==='TUTORIAL' ? 'z1' : ZONES[S.zoneIdx].key;
  drawZoneBG(zoneKey);
  drawWaterline();
  drawAmbient();
  // 장애물
  if(S.mode==='ZONE') for(const o of S.obstacles) drawObstacle(o);
  if(S.mode==='TUTORIAL'){ if(S.tutStage===0) drawTutRings(); for(const o of S.tutObs) drawObstacle(o); }
  drawParticles();
  drawFish();
  drawPops();
  drawHUD();
  if(S.mode==='TUTORIAL') drawTutOverlay();
  drawTrap();
  drawBanner();
  drawFlashMsg();
}
function drawTrap(){ if(!S.trapped) return;
  ctx.save(); ctx.textAlign='center';
  ctx.font='bold 70px sans-serif'; ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,0.6)';
  ctx.fillStyle=(Math.sin(S.t*22)>0)?'#ffe14d':'#fff';
  ctx.strokeText('스페이스·화면 연타!', W/2, H*0.27); ctx.fillText('스페이스·화면 연타!', W/2, H*0.27);
  const gw=600, gx=W/2-gw/2, gy=H*0.33;
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(gx,gy,gw,38);
  ctx.fillStyle='#ff3b3b'; ctx.fillRect(gx,gy,gw*Math.max(0,Math.min(1,S.trapHP==null?1:S.trapHP)),38); // 빨강 100% → 연타로 차감, 0이면 탈출
  ctx.lineWidth=4; ctx.strokeStyle='#fff'; ctx.strokeRect(gx,gy,gw,38);
  ctx.textAlign='left'; ctx.restore();
}

function drawBGImage(key, alpha){
  const a=A[key], par=0.32, off=(S.scroll*par)%W;
  ctx.save(); ctx.globalAlpha=alpha;
  if(a && a.ok){
    ctx.drawImage(a.img, -off, 0, W, H);
    ctx.translate(2*W-off,0); ctx.scale(-1,1); ctx.drawImage(a.img,0,0,W,H);
  } else {
    const z=ZONES.find(z=>z.key===key)||ZONES[0];
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,z.tint); g.addColorStop(1,'#02060d');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}
function applyVeil(){ ctx.fillStyle='rgba(120,150,170,0.26)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='rgba(8,14,26,0.16)'; ctx.fillRect(0,0,W,H); }
function drawBG(key){ drawBGImage(key,1); if(key!=='z5') applyVeil(); }
// 존 전환 크로스페이드: 이전 존 배경 위에 새 존 배경을 서서히 얹음
function drawZoneBG(key){
  if(S.fadeT>0 && S.fadeFrom){ drawBGImage(S.fadeFrom,1); drawBGImage(key, 1-Math.max(0,S.fadeT)); }
  else drawBGImage(key,1);
  applyVeil();
}

function drawObstacle(o){
  ctx.save();
  if(o.type==='coral'){
    drawCoralPair(o);
  } else if(o.type==='net'){
    if(!o.broken) drawNetPair(o);
  } else if(o.type==='octopus'){
    // 문어: 상단에서 촉수를 내림. 스프라이트 머리 + 촉수 히트영역
    if(!drawAnimSprite('octopus', o.x+o.w/2, Y_MIN-40+o.len*0.5, 460, false) && !drawSprite('e_octopus', o.x+o.w/2, Y_MIN-40+o.len*0.5, 460, false)){
      ctx.fillStyle='#a24fb0'; roundBlock(o.x,Y_MIN-40,o.w,o.len,20);
    }
  } else if(o.type==='jelly'){
    if(!drawAnimSprite('jelly', o.x, o.y+40, o.w) && !drawSprite('e_jelly', o.x, o.y+40, o.w)){
      ctx.fillStyle='rgba(180,90,220,0.8)'; ctx.beginPath(); ctx.arc(o.x,o.y,44,0,7); ctx.fill();
    }
  } else if(o.type==='shark'){
    if(o.warned>0){ // 예고: 오른쪽 붉은 화살표 경고
      const a=0.4+0.4*Math.sin(S.t*20);
      ctx.fillStyle='rgba(255,40,40,'+a+')'; ctx.font='bold 90px sans-serif'; ctx.textAlign='right';
      ctx.fillText('◀ !', W-40, o.y+20); ctx.textAlign='left';
    } else {
      if(!drawAnimSprite('shark', o.x, o.y, o.w, false) && !drawSprite('e_shark', o.x, o.y, o.w, false)){
        ctx.fillStyle='#3a4a5a'; ctx.beginPath(); ctx.moveTo(o.x-160,o.y); ctx.lineTo(o.x+120,o.y-90); ctx.lineTo(o.x+120,o.y+90); ctx.fill();
      }
    }
  } else if(o.type==='crab'){
    const rise=(o.snap||0)*40, sc=1+(o.snap||0)*0.12;
    if(!drawAnimSprite('crab', o.x, Y_MAX-40-rise, (o.w+40)*sc, false) && !drawSprite('e_crab', o.x, Y_MAX-40-rise, (o.w+40)*sc, false)){
      ctx.fillStyle='#e0483a'; ctx.beginPath(); ctx.arc(o.x,Y_MAX-40,60,0,7); ctx.fill();
    }
  } else if(o.type==='puffer'){
    if(!drawAnimSprite('puffer', o.x, o.y, o.w*o.puff) && !drawSprite('e_puffer', o.x, o.y, o.w*o.puff)){
      ctx.fillStyle='#c9a34a'; ctx.beginPath(); ctx.arc(o.x,o.y,52*o.puff,0,7); ctx.fill();
    }
  } else if(o.type==='rock'){
    ctx.save(); ctx.translate(o.x, Y_MAX-20); ctx.rotate(o.rot);
    if(!drawSprite('prop_rock',0,0,210)){ ctx.fillStyle='#5a6b4a'; ctx.beginPath(); ctx.arc(0,0,95,0,7); ctx.fill(); }
    ctx.restore();
  } else if(o.type==='seaweed'){
    if(!drawAnimSprite('seaweed', o.x, Y_MAX-40, 210) && !drawSprite('prop_seaweed', o.x, Y_MAX-40, 210)){
      ctx.fillStyle='#3a7a3a'; ctx.fillRect(o.x-40,Y_MAX-160,80,220); }
  } else if(o.type==='nettrap'){
    const x=o.x, w=o.w;
    if(!drawAnimRect('net',x-w/2,-10,w,H+20,false)) drawSpriteRect('prop_net',x-w/2,-10,w,H+20,false);
    ctx.strokeStyle=o.caught?'#ff5a5a':'#2ffbe0'; ctx.lineWidth=6; ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=10;
    ctx.strokeRect(x-w/2,-10,w,H+20); ctx.shadowBlur=0;
  } else if(o.type==='rainbow'){
    ctx.save(); ctx.lineWidth=16; ctx.globalAlpha=o.got?0.3:0.9;
    const cols=['#ff5a5a','#ffb03a','#ffe14d','#5aff8f','#3fd9ff','#c77dff'];
    for(let i=0;i<cols.length;i++){ ctx.strokeStyle=cols[i]; ctx.beginPath(); ctx.arc(o.x, H+120, 360-i*16, Math.PI*1.15, Math.PI*1.85); ctx.stroke(); }
    ctx.restore();
  } else if(o.type==='hook'){
    if(!drawAnimH('hook', o.x+o.w/2, Y_MIN-40, o.len+30) && !drawSpriteH('prop_hook', o.x+o.w/2, Y_MIN-40, o.len+30)){
      const cx=o.x+o.w/2, by=Y_MIN-40+o.len-30; ctx.strokeStyle='#d9e2ec'; ctx.lineWidth=8; ctx.beginPath(); ctx.moveTo(cx,Y_MIN-40); ctx.lineTo(cx,by); ctx.arc(cx-18,by,20,0,Math.PI); ctx.stroke();
    }
  } else if(o.type==='line'){
    const lx=o.x, by=o.baitY;
    // 줄+미끼 스프라이트(미끼가 baitY에 오도록). 줄은 얇아 통과 가능함을 시사, 미끼만 위험.
    if(!drawAnimH('hook', lx, Y_MIN-40, by-(Y_MIN-40)+40) && !drawSpriteH('prop_hook', lx, Y_MIN-40, by-(Y_MIN-40)+40)){
      ctx.strokeStyle='rgba(210,225,245,0.45)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(lx,Y_MIN-40); ctx.lineTo(lx,by); ctx.stroke();
    }
    const pr=6*Math.sin(S.t*8); // 미끼 위험 강조 링
    ctx.strokeStyle='rgba(255,60,60,0.75)'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(lx,by,32+pr,0,7); ctx.stroke();
  } else if(o.type==='gull'){
    if(!drawAnimSprite('gull', o.x+60, o.y+35, 150, false) && !drawSprite('e_gull', o.x+60, o.y+35, 140, false)) drawGull(o);
    if(o.pre>0){ // 급강하 예고 "!"
      ctx.fillStyle='rgba(255,60,60,'+(0.5+0.5*Math.sin(S.t*24))+')';
      ctx.font='bold 64px sans-serif'; ctx.textAlign='center'; ctx.fillText('!', o.x+60, o.y-30); ctx.textAlign='left';
    }
  } else if(o.type==='wave'){
    if(!drawAnimRect('wave', o.x-40, H-o.h-30, o.w+120, o.h+60, false) && !drawSpriteRect('prop_wave', o.x-40, H-o.h-30, o.w+120, o.h+60, false)){
      ctx.fillStyle='#2a6f8f'; ctx.beginPath(); ctx.moveTo(o.x,H); ctx.quadraticCurveTo(o.x+o.w/2,H-o.h, o.x+o.w,H); ctx.fill();
    }
  }
  ctx.restore();
}
function roundBlock(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.fill(); }
function drawGapSprite(o, key, edge){
  const topH=o.gapY-o.gap/2, botY=o.gapY+o.gap/2;
  // 회색 박스 없이 스프라이트만(이질감 제거). 위 세그먼트는 상하반전으로 천장에서 내려옴.
  const anim=key.replace('prop_','');
  if(!drawAnimRect(anim,o.x,-10,o.w,topH+10,true)) drawSpriteRect(key,o.x,-10,o.w,topH+10,true);
  if(!drawAnimRect(anim,o.x,botY,o.w,H-botY+10,false)) drawSpriteRect(key,o.x,botY,o.w,H-botY+10,false);
  // 갭 가장자리 강조(통과 지점 안내)
  ctx.strokeStyle=edge; ctx.lineWidth=5; ctx.shadowColor=edge; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(o.x,topH); ctx.lineTo(o.x+o.w,topH); ctx.moveTo(o.x,botY); ctx.lineTo(o.x+o.w,botY); ctx.stroke();
  ctx.shadowBlur=0;
}
function drawCoralPair(o){ if(!(A.prop_coral&&A.prop_coral.ok)){ ctx.fillStyle='#1c2f52'; const topH=o.gapY-o.gap/2,botY=o.gapY+o.gap/2; roundBlock(o.x,-10,o.w,topH+10,16); roundBlock(o.x,botY,o.w,H-botY+10,16);} else drawGapSprite(o,'prop_coral','#ffb45a'); }
function drawNetPair(o){ if(!(A.prop_net&&A.prop_net.ok)){ ctx.fillStyle='rgba(8,20,26,0.72)'; const topH=o.gapY-o.gap/2,botY=o.gapY+o.gap/2; ctx.fillRect(o.x,-10,o.w,topH+10); ctx.fillRect(o.x,botY,o.w,H-botY+10);} else drawGapSprite(o,'prop_net','#2ffbe0'); }
function drawGull(o){
  ctx.fillStyle='#eef3f8'; ctx.beginPath(); ctx.ellipse(o.x+60,o.y+35,44,20,0,0,7); ctx.fill();
  ctx.fillStyle='#cfd8e0'; ctx.beginPath(); ctx.moveTo(o.x+50,o.y+30); ctx.lineTo(o.x+20,o.y+5); ctx.lineTo(o.x+70,o.y+28); ctx.fill();
  ctx.fillStyle='#ffb03a'; ctx.beginPath(); ctx.moveTo(o.x+100,o.y+34); ctx.lineTo(o.x+122,o.y+38); ctx.lineTo(o.x+100,o.y+42); ctx.fill();
}

function drawFish(){
  let key='fish_idle';
  if((S.mode==='FINALE'&&S.landing)||S.mode==='RESULT') key='fish_joy'; // 착지=기쁨 포즈(팔딱)
  else if(S.mode==='FINALE') key='fish_idle';                            // 상승 중=헤엄
  else if(S.iframe>0 && Math.floor(S.iframe*20)%2===0) key='fish_hit';
  else if(S.flapAnim>0 || S.fishVY<-120) key='fish_flap';
  const a=A[key];
  // 주인공 분리용 소프트 다크 헤일로(존1~3 위장 방지) — 회전 전, 월드좌표
  if(S.mode==='ZONE' && S.zoneIdx<=2){
    const hg=ctx.createRadialGradient(FISH_X,S.fishY,20,FISH_X,S.fishY,170);
    hg.addColorStop(0,'rgba(0,0,0,0.38)'); hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(FISH_X,S.fishY,170,0,7); ctx.fill();
  }
  // 기본 유영 상태는 애니메이션 스윔 사용(charge/dash/hit/joy는 정적 포즈 유지)
  const useAnim = (key==='fish_idle'||key==='fish_flap') && A['anim_fish'] && A['anim_fish'].ok;
  ctx.save();
  ctx.translate(FISH_X+(S.fishXOff||0),S.fishY); ctx.rotate(S.rot);
  if(S.iframe>0 && Math.floor(S.iframe*30)%2===0) ctx.globalAlpha=0.5;
  drawFishLegs();  // 육지에서 돋아난 다리 — 몸통보다 먼저(뒤에) 그린다
  ctx.shadowColor='rgba(255,240,150,0.9)'; ctx.shadowBlur=18; // 림 글로우(가독성)
  if(useAnim){
    drawAnimSprite('fish', 0, 0, 230, false);
    ctx.shadowBlur=0;
  } else if(a && a.ok){
    const w=230, h=w*a.img.height/a.img.width;
    ctx.drawImage(a.img,-w/2,-h/2,w,h); ctx.shadowBlur=0;
    ctx.drawImage(a.img,-w/2,-h/2,w,h);
  } else { ctx.shadowBlur=0; // 폴백 물고기
    ctx.fillStyle='#6fb3c9'; ctx.beginPath(); ctx.ellipse(0,0,55,26,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-50,0); ctx.lineTo(-80,-22); ctx.lineTo(-80,22); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(30,-6,8,0,7); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(32,-6,4,0,7); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.restore();
}

// 육지에 나온 고등어: 얇은 막대 다리 + 커다란 컨버스 운동화. 고등어 몸은 플레이 스프라이트 그대로.
// S.legs(0→1): 다리 돋아남 진행. S.walk: 걷기 사이클 위상. S.walkOff: 걸어 나가는 중.
const _easeOut=t=>1-Math.pow(1-t,3);
// 커다란 컨버스 하이탑 운동화 하나. (x,y)=발목, up=신발 위쪽 방향각(0=아래로 서있음), sc=크기
function drawSneaker(x,y,tilt,sc){
  ctx.save(); ctx.translate(x,y); ctx.rotate(tilt); ctx.scale(sc,sc);
  // 밑창(흰 고무) — 앞코가 머리쪽(+x)으로 크게
  ctx.fillStyle='#f4efe6'; ctx.strokeStyle='#20242a'; ctx.lineWidth=2.2; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(-13,6); ctx.lineTo(20,6);
  ctx.quadraticCurveTo(30,6, 30,1);       // 앞코 둥글게
  ctx.quadraticCurveTo(30,-3, 22,-3);
  ctx.lineTo(-13,-3); ctx.closePath(); ctx.fill(); ctx.stroke();
  // 밑창 줄무늬
  ctx.strokeStyle='#c9c1b2'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(-11,1.5); ctx.lineTo(26,1.5); ctx.stroke();
  // 갑피(빨간 캔버스 하이탑)
  ctx.fillStyle='#d8493b'; ctx.strokeStyle='#20242a'; ctx.lineWidth=2.2;
  ctx.beginPath();
  ctx.moveTo(-13,-3); ctx.lineTo(22,-3);
  ctx.quadraticCurveTo(24,-16, 12,-20);   // 앞코~발등
  ctx.quadraticCurveTo(2,-24, -4,-24);    // 발목 입구
  ctx.lineTo(-13,-24); ctx.closePath(); ctx.fill(); ctx.stroke();
  // 발목 밴드(하이탑)
  ctx.fillStyle='#c23e31'; ctx.beginPath(); ctx.moveTo(-13,-24); ctx.lineTo(-4,-24); ctx.lineTo(-4,-14); ctx.lineTo(-13,-14); ctx.closePath(); ctx.fill(); ctx.stroke();
  // 흰 앞코 캡 + 동그란 사이드 패치(컨버스 상징)
  ctx.fillStyle='#f4efe6'; ctx.beginPath(); ctx.moveTo(22,-3); ctx.quadraticCurveTo(24,-12,14,-16); ctx.quadraticCurveTo(24,-9,22,-3); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#f4efe6'; ctx.beginPath(); ctx.arc(6,-9,4.2,0,7); ctx.fill(); ctx.strokeStyle='#20242a'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#d8493b'; ctx.beginPath(); ctx.arc(6,-9,1.6,0,7); ctx.fill();
  // 끈(라이트닝 지그재그)
  ctx.strokeStyle='#f4efe6'; ctx.lineWidth=1.6;
  for(let i=0;i<3;i++){ const yy=-20+i*4.5; ctx.beginPath(); ctx.moveTo(-2,yy); ctx.lineTo(10,yy+2); ctx.stroke(); }
  ctx.restore();
}
function drawFishLegs(){
  const g=Math.max(0,Math.min(1,S.legs||0));
  if(g<=0) return;
  const gg=_easeOut(g);
  const bellyY=22;                    // 배 아래 다리가 붙는 지점
  const walk=S.walk||0;
  const walking=(S.walkOff===true);
  const shoeSc=0.86*Math.min(1,gg*1.3); // 신발은 다리보다 조금 먼저 커진다(부각)
  ctx.save();
  // 신발이 확 튀게 → 다리는 아주 얇게, 발끝의 큰 신발이 주인공
  for(const leg of [{x:14,ph:0},{x:-10,ph:Math.PI}]){
    const swing = walking ? Math.sin(walk*2 + leg.ph) : 0;
    const lift  = walking ? Math.max(0,Math.sin(walk*2+leg.ph))*18 : 0;  // 크게 들어 신발 부각
    const legLen = 54*gg;                                                // 더 길게 → 성큼거림
    const hipX=leg.x, hipY=bellyY;
    const kneeX=hipX+swing*10, kneeY=hipY+legLen*0.5-lift*0.35;
    const ankX=hipX+swing*18, ankY=hipY+legLen-lift;
    // 얇은 막대 다리(검은 실루엣)
    ctx.strokeStyle='#20242a'; ctx.lineWidth=3.4; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(hipX,hipY); ctx.lineTo(kneeX,kneeY); ctx.lineTo(ankX,ankY); ctx.stroke();
    // 커다란 컨버스 운동화 — 든 발일수록 앞코가 위로 들린다(항상 앞코는 오른쪽)
    if(gg>0.25){ const tilt=-lift*0.018; drawSneaker(ankX, ankY, tilt, shoeSc); }
  }
  // 막 돋아날 때 반짝(팟) 이펙트
  if(g>0.05 && g<0.5){ const f=(0.5-g)/0.45; ctx.globalAlpha=f*0.7; ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
    for(const lx of [14,-10]){ for(let i=0;i<4;i++){ const a=Math.PI*0.25+i*0.5; ctx.beginPath(); ctx.moveTo(lx,bellyY+6); ctx.lineTo(lx+Math.cos(a)*15,bellyY+6+Math.sin(a)*15); ctx.stroke(); } } ctx.globalAlpha=1; }
  ctx.restore();
}

function drawWaterline(){ if(!(S.mode==='ZONE'&&S.zoneIdx===3)) return;
  ctx.save();
  ctx.fillStyle='rgba(18,52,74,0.20)'; ctx.fillRect(0,WATERLINE,W,H-WATERLINE); // 물속(아래) 톤
  const off=(S.scroll*0.5)%40;
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=5; ctx.beginPath();
  for(let x=-off;x<=W;x+=20){ const yy=WATERLINE+Math.sin(x*0.02+S.t*3)*9; if(x<=0)ctx.moveTo(0,yy); else ctx.lineTo(x,yy); }
  ctx.stroke();
  ctx.strokeStyle='rgba(140,200,230,0.35)'; ctx.lineWidth=2; ctx.beginPath();
  for(let x=-off;x<=W;x+=20){ const yy=WATERLINE+10+Math.sin(x*0.02+S.t*3+1)*7; if(x<=0)ctx.moveTo(0,yy); else ctx.lineTo(x,yy); }
  ctx.stroke(); ctx.restore();
}
function drawAmbient(){ ctx.save(); for(const p of (S.amb||[])){ ctx.globalAlpha=0.22; ctx.strokeStyle='#dff3ff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.stroke(); } ctx.restore(); ctx.globalAlpha=1; }
function drawPops(){ ctx.save(); ctx.textAlign='center'; ctx.font='bold 34px sans-serif'; for(const p of (S.pops||[])){ ctx.globalAlpha=Math.min(1,p.life); ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.strokeText(p.txt,p.x,p.y); ctx.fillStyle=p.c; ctx.fillText(p.txt,p.x,p.y);} ctx.globalAlpha=1; ctx.textAlign='left'; ctx.restore(); }
function drawParticles(){ for(const p of S.particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill(); } ctx.globalAlpha=1; }
function drawConfetti(){ for(const p of S.confetti){ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); ctx.restore(); } }
function drawTutRings(){ for(const r of S.tutRings){ if(r.hit) continue; ctx.strokeStyle='rgba(127,255,212,0.9)'; ctx.lineWidth=10; ctx.beginPath(); ctx.arc(r.x,r.y,60+Math.sin(S.t*6)*6,0,7); ctx.stroke(); } }

// ---------- HUD ----------
// 하트를 이모지가 아닌 캔버스 도형으로 직접 그림 — 송출 기기·폰트와 무관하게 항상 보임
function heartPath(s){
  ctx.beginPath();
  ctx.moveTo(0, 0.35*s);
  ctx.bezierCurveTo(0, 0.1*s, -0.25*s, -0.45*s, -0.55*s, -0.45*s);
  ctx.bezierCurveTo(-1.1*s, -0.45*s, -1.1*s, 0.2*s, -1.1*s, 0.2*s);
  ctx.bezierCurveTo(-1.1*s, 0.6*s, -0.6*s, 1.0*s, 0, 1.35*s);
  ctx.bezierCurveTo(0.6*s, 1.0*s, 1.1*s, 0.6*s, 1.1*s, 0.2*s);
  ctx.bezierCurveTo(1.1*s, 0.2*s, 1.1*s, -0.45*s, 0.55*s, -0.45*s);
  ctx.bezierCurveTo(0.25*s, -0.45*s, 0, 0.1*s, 0, 0.35*s);
  ctx.closePath();
}
function drawHUD(){
  // 하트 3개 = 도전 가능 횟수. 피격 시 소멸, 0이면 게임오버.
  for(let i=0;i<3;i++){
    const lx=66+i*96, ly=44, on=i<S.lives;
    ctx.save(); ctx.translate(lx,ly);
    if(on && S.iframe>0){ const sc=1+0.12*Math.sin(S.t*30); ctx.scale(sc,sc); }
    heartPath(30);
    if(on){ ctx.fillStyle='#ff3b4e'; ctx.fill(); ctx.lineWidth=5; ctx.strokeStyle='#fff'; ctx.stroke(); }
    else { ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fill(); ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.stroke(); }
    // 방금 잃은 하트: 커지며 사라지는 빨간 하트 + 균열 (실시간 피드백)
    if(i===S.heartLossIdx && S.heartLossT>0){ const p=Math.max(0,S.heartLossT/0.9);
      ctx.save(); const sc=1+(1-p)*1.3; ctx.scale(sc,sc); ctx.globalAlpha=p;
      heartPath(30); ctx.fillStyle='#ff3b4e'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.beginPath();
      ctx.moveTo(2,-12); ctx.lineTo(-6,2); ctx.lineTo(5,12); ctx.lineTo(-3,28); ctx.stroke();
      ctx.restore(); }
    ctx.restore();
  }
  // 진행률 바 — 구간 눈금 + 물고기 마커 (관객이 여정 위치를 한눈에)
  const prog = Math.min(1, elapsedTotal()/TOTAL);
  const bx=W/2-360, bw=720;
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(bx,26,bw,28);
  ctx.fillStyle='#7fffd4'; ctx.fillRect(bx,26,bw*prog,28);
  // 구간 경계 눈금
  let acc=TUT_DUR;
  for(let i=0;i<ZONES.length;i++){ acc+=ZONES[i].dur; const tx=bx+bw*acc/TOTAL;
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(tx,26); ctx.lineTo(tx,54); ctx.stroke(); }
  ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.strokeRect(bx,26,bw,28);
  // 끝점 = 육지 라벨, 현재 위치 = 노란 마커
  ctx.font='bold 22px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='#ffe14d'; ctx.fillText('육지', bx+bw+34, 48);
  const fx=bx+bw*prog;
  ctx.fillStyle='#ffe14d'; ctx.beginPath(); ctx.moveTo(fx,20); ctx.lineTo(fx-10,6); ctx.lineTo(fx+10,6); ctx.closePath(); ctx.fill();
  ctx.textAlign='left';
  ctx.fillStyle='#fff'; ctx.font='bold 30px sans-serif'; ctx.textAlign='center';
  const label = S.mode==='FINALE'?'육지 도착!' : (ZONES[S.zoneIdx]?((S.zoneIdx+1)+'구간 · '+ZONES[S.zoneIdx].name):'');
  ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=5; ctx.strokeText(label, W/2, 82);
  ctx.fillText(label, W/2, 82);
  // 점수(우상단)
  ctx.textAlign='right'; ctx.font='bold 44px sans-serif';
  ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=5; ctx.strokeText(Math.floor(S.score).toLocaleString(), W-40, 62);
  ctx.fillStyle='#ffe14d'; ctx.fillText(Math.floor(S.score).toLocaleString(), W-40, 62);
  ctx.font='18px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fillText('점수', W-42, 84);
  ctx.textAlign='left';
  // 상어 추격 비네트
  if(S.shark>0.05){ const g=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(180,0,0,'+(0.35*S.shark)+')'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
}
function elapsedTotal(){
  let e=TUT_DUR;
  if(S.mode==='TUTORIAL') return Math.min(TUT_DUR, S.tutT||0);
  for(let i=0;i<S.zoneIdx;i++) e+=ZONES[i].dur;
  if(S.mode==='ZONE') e+=S.zoneT;
  else if(S.mode==='FINALE'||S.mode==='RESULT'){ e=TUT_DUR+ZONES.reduce((a,z)=>a+z.dur,0)+ (S.finaleT||0); }
  return e;
}

// 상단 힌트 필(한 줄, 한 번에 하나만)
function hintPill(txt,y,sub){
  ctx.save(); ctx.textAlign='center'; ctx.font='bold 46px sans-serif';
  const w=ctx.measureText(txt).width+90;
  roundPath(W/2-w/2,y-56,w,86,42); ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fill();
  ctx.strokeStyle='rgba(127,255,212,0.65)'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.fillText(txt,W/2,y+6);
  if(sub){ ctx.font='26px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillText(sub,W/2,y+62); }
  ctx.textAlign='left'; ctx.restore();
}
function drawTutOverlay(){
  if(S.tutStage===0 && S.tutTaps===0){
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#ffe14d'; ctx.font='bold 40px sans-serif';
    ctx.fillText('무리를 잃은 고등어 — 전설의 육지로 간다!', W/2, H*0.3);
    // 스페이스바 아이콘 맥동
    const s=1+Math.sin(S.t*4)*0.06; const bw=520*s, bh=120*s, bx=W/2-bw/2, by=H*0.62;
    ctx.fillStyle='#fff'; roundBlock(bx,by,bw,bh,20);
    ctx.fillStyle='#0a1226'; ctx.font='bold 44px sans-serif'; ctx.fillText('SPACE', W/2, by+bh/2+16);
    ctx.fillStyle='#fff'; ctx.font='bold 46px sans-serif'; ctx.fillText('짧게 탭 = 위로 헤엄!', W/2, H*0.44);
    ctx.textAlign='left'; return;
  }
  if(S.tutStage===0) hintPill('탭! 탭! 물방울 링을 통과해봐', 176);
  else if(S.tutStage===1 && !S.trapped) hintPill('해파리와 해초다! 위아래로 피해!', 176, '부딪히면 하트를 잃는다 — 지금은 연습이라 괜찮아');
  else if(S.tutStage===2 && !S.trapped) hintPill('그물이 온다! 잡히면 연타로 탈출!', 176, '스페이스·화면을 마구 두드려라');
  else if(S.tutStage===3){
    hintPill('심해 → 중층 → 수면 → 갯벌 → 육지!', 176, '하트 3개 — 부딪히면 하나씩 · 진행바가 다 차면 육지 도착');
    ctx.fillStyle='#fff'; ctx.font='bold 200px sans-serif'; ctx.textAlign='center'; ctx.fillText(Math.max(1,Math.ceil(S.cd)), W/2, H/2+70); ctx.textAlign='left';
  }
}

function drawTitle(){
  drawBG('title');
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='bold 116px sans-serif';
  ctx.fillText('고등어: 육지 대탈출', W/2, H*0.34);
  ctx.font='34px sans-serif'; ctx.fillStyle='#bfe9ff';
  ctx.fillText('버튼 하나 — 스페이스 / 엔터 — 육지까지 헤엄쳐라', W/2, H*0.44);
  ctx.font='bold 40px sans-serif'; ctx.fillStyle= (Math.sin(S.t*4)>0)?'#ffd23f':'#fff';
  ctx.fillText('▶ 스페이스 또는 화면을 눌러 시작', W/2, H*0.62);
  const bs=bestScore(); if(bs>0){ ctx.font='bold 30px sans-serif'; ctx.fillStyle='#7fffd4';
    ctx.fillText('최고 기록  '+bs.toLocaleString(), W/2, H*0.7); }
  ctx.font='22px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('오퍼레이터  S 시작 · R 리셋 · T 튜토리얼 생략 · F 피날레 · 1-4 구간 이동', W/2, H*0.9);
  ctx.textAlign='left';
}
function roundPath(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawResult(){
  if(S._best==null){ S.score+=S.lives*300; S._best=bestScore(Math.floor(S.score)); } // 완주 보너스 + 최고점 기록
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 100px sans-serif';
  ctx.fillText('드디어 육지 도착!', W/2, H*0.32);
  ctx.font='bold 76px sans-serif'; ctx.fillStyle='#ffe14d';
  ctx.fillText('점수  '+Math.floor(S.score).toLocaleString(), W/2, H*0.48);
  ctx.font='32px sans-serif'; ctx.fillStyle='#bfe9ff';
  ctx.fillText('최고 '+S._best.toLocaleString()+'   ·   남은 하트 '+S.lives+'개 (+'+(S.lives*300)+')', W/2, H*0.57);
  ctx.font='30px sans-serif'; ctx.fillStyle=(Math.sin(S.t*4)>0)?'#ffd23f':'#fff';
  ctx.fillText('스페이스를 누르면 다시 시작', W/2, H*0.7);
  ctx.textAlign='left';
  S.resT=(S.resT||0)+0.016; if(S.resT>6) reset(true);
}
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff5a5a'; ctx.font='bold 140px sans-serif';
  ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.strokeText('게임 오버', W/2, H*0.4); ctx.fillText('게임 오버', W/2, H*0.4);
  if(S._best==null){ S._best=bestScore(Math.floor(S.score)); }
  ctx.font='bold 68px sans-serif'; ctx.fillStyle='#ffe14d';
  ctx.fillText('점수  '+Math.floor(S.score).toLocaleString(), W/2, H*0.52);
  ctx.fillStyle='#fff'; ctx.font='30px sans-serif';
  const zn = ZONES[S.deadZone||0] ? (((S.deadZone||0)+1)+'구간 '+ZONES[S.deadZone||0].name) : '';
  ctx.fillText('최고 '+S._best.toLocaleString()+'   ·   '+zn+'에서 잡혔다', W/2, H*0.59);
  if((S.goT||0)>0.6){ ctx.font='bold 34px sans-serif'; ctx.fillStyle=(Math.sin(S.t*4)>0)?'#ffd23f':'#fff';
    ctx.fillText('▶ 스페이스 또는 화면을 눌러 재도전', W/2, H*0.7); }
  ctx.textAlign='left';
}
function drawFlashMsg(){
  if(S.hitFlash>0){ ctx.fillStyle=S._flashC||'#fff'; ctx.globalAlpha=Math.min(0.5,S.hitFlash); ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
  if(S.msgT>0){ ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,S.msgT); ctx.font='bold 60px sans-serif'; ctx.lineWidth=7; ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.strokeText(S.msg,W/2,H*0.4); ctx.fillStyle='#ffe14d'; ctx.fillText(S.msg,W/2,H*0.4); ctx.globalAlpha=1; ctx.textAlign='left'; }
}
if(S.mode==='RESULT'){}

// ---------- 메인 루프 (프레임 독립 · 고정 타임스텝) ----------
let last=performance.now(), acc=0; const STEP=1/60;
function loop(now){
  let frame=(now-last)/1000; last=now; if(frame>0.25) frame=0.25;
  // 히트스톱: 충돌 순간 몇 프레임 정지(타격 무게감)
  if(S.hitstop>0){ S.hitstop-=frame; ctx.save(); if(S.shake>0.3) ctx.translate((Math.random()-0.5)*S.shake,(Math.random()-0.5)*S.shake); draw(); ctx.restore(); requestAnimationFrame(loop); return; }
  // 슬로모: 게임 시간만 느리게(연출 시간은 실시간 감쇠)
  if(S.slowmo>0){ S.slowmo-=frame; acc+=frame*0.35; } else acc+=frame;
  if(S.shake>0) S.shake=Math.max(0,S.shake-40*frame);
  while(acc>=STEP){ update(STEP); acc-=STEP; }
  bgmTick();
  ctx.save();
  if(S.shake>0.3){ ctx.translate((Math.random()-0.5)*S.shake,(Math.random()-0.5)*S.shake); }
  draw();
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
